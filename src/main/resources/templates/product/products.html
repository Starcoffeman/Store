<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Товары</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <style>
        .container-fluid {
            flex: 1;
        }

        .blockquote {
            background-color: rgba(48, 104, 96, 0.9);
            color: #d3ecec;
            text-align: center;
            padding: 20px;
            margin: 0;
        }

        .blockquote h1, .blockquote h2 {
            margin: 0;
            color: #d3ecec;
        }

        .catalog-title {
            background-color: transparent;
            color: #123530;
            text-align: center;
            padding: 10px;
            margin: 0;
        }

        .fin {
            background-color: #90a6a4;
        }

        .catalog-title a {
            color: #123530;
            text-decoration: none;
        }

        .catalog-title a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="fin">
    <blockquote class="blockquote text-center">
        <h1>Интернет-магазин цифровых товаров</h1>
    </blockquote>
    <h2 class="catalog-title">Товары</h2>
</div>
<div class="container-fluid bg-image"
     style="background-color: #90a6a4; height: 100vh; overflow: auto">
    <table id="productsTable" class="table table-striped table-responsive-md">
        <thead>
        <tr>
            <th scope="col">ID</th>
            <th scope="col">Название</th>
            <th scope="col">Категория</th>
            <th scope="col">Описание</th>
            <th scope="col">Цена</th>
            <th scope="col">Ссылка на файл</th>
            <th scope="col">Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="product: ${listProducts}">
            <td th:text="${product.id}">ID</td>
            <td th:text="${product.name}">Название</td>
            <td th:text="${product.category.getName()}">Категория</td>
            <td th:text="${product.description}">Описание</td>
            <td th:text="${product.price}">Цена</td>
            <td th:text="${product.fileurl}">Ссылка на файл</td>
            <td>
                <a th:href="@{'/products/edit/' + ${product.id}}" class="btn btn-primary btn-sm">Редактировать</a>
                <a th:href="@{'/products/delete/' + ${product.id}}" class="btn btn-warning btn-sm">Удалить</a>
            </td>
        </tr>
        </tbody>
    </table>

    <div class="btn-group" role="group" aria-label="Basic example">
        <a href="/products/add" class="btn btn-primary" aria-pressed="false" autocomplete="off">
            Добавить товар
        </a>
        <a style="margin-left: 10px" href="/admin" class="btn btn-secondary">Назад</a>
    </div>
</div>
</body>
</html>
