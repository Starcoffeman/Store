<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Редактирование товара</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <style>
        .container-fluid {
            flex: 1;
        }

        .blockquote {
            background-color: rgba(48, 104, 96, 0.9);
            color: #d3ecec;
            text-align: center;
            padding: 20px;
            margin: 0;
        }

        .blockquote h1, .blockquote h2 {
            margin: 0;
            color: #d3ecec;
        }

        .catalog-title {
            background-color: transparent;
            color: #123530;
            text-align: center;
            padding: 10px;
            margin: 0;
        }

        .fin {
            background-color: #90a6a4;
        }

        .catalog-title a {
            color: #123530;
            text-decoration: none;
        }

        .catalog-title a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="fin">
    <blockquote class="blockquote text-center">
        <h1>Информационно-справочная система магазина саженцев деревьев и кустарников</h1>
    </blockquote>
    <h2 class="catalog-title">Редактирование товара</h2>
</div>
<div class="container-fluid bg-image"
     style="background-color: #90a6a4; height: 100vh; overflow: auto">
    <form th:action="@{/products/edit/{id}(id=${product.id})}" th:object="${product}" method="post">
        <div class="form-group">
            <label for="name">Название:</label>
            <input type="text" class="form-control" id="name" th:field="*{name}" required/>
            <div th:if="${#fields.hasErrors('name')}" class="text-danger">
                <span th:errors="*{name}"></span>
            </div>
        </div>
        <div class="form-group">
            <label for="description">Описание:</label>
            <textarea class="form-control" id="description" th:field="*{description}" required></textarea>
            <div th:if="${#fields.hasErrors('description')}" class="text-danger">
                <span th:errors="*{description}"></span>
            </div>
        </div>
        <div class="form-group">
            <label for="price">Цена:</label>
            <input type="number" step="0.01" class="form-control" id="price" th:field="*{price}" required/>
            <div th:if="${#fields.hasErrors('price')}" class="text-danger">
                <span th:errors="*{price}"></span>
            </div>
        </div>
        <div class="form-group">
            <label for="fileurl">Ссылка на файл:</label>
            <input type="text" class="form-control" id="fileurl" th:field="*{fileurl}" required/>
            <div th:if="${#fields.hasErrors('fileurl')}" class="text-danger">
                <span th:errors="*{fileurl}"></span>
            </div>
        </div>
        <div style="display: flex;justify-content:space-between;padding: 10px 0">
            <button type="submit" class="btn btn-success">Сохранить</button>
            <a href="/products" class="btn btn-secondary">Назад</a>
        </div>
    </form>

</div>
</body>
</html>
