<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Добавление пользователя</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <style>
        .container-fluid {
            flex: 1;
        }


        .blockquote h1, .blockquote h2 {
            margin: 0;
            color: #d3ecec;
        }

        .catalog-title {
            background-color: transparent;
            color: #123530;
            text-align: center;
            padding: 30px;
            margin: 0;
        }

        .fin {
            background-color: #90a6a4;
        }

        .formUser {
            width: 300px;
            margin: 0 auto;/
        padding: 20px;
        }

        .form-container {
            display: flex;
            justify-content: center;
            height: 100%;

        }

        .catalog-title a {
            color: #123530;
            text-decoration: none;
            margin-bottom:30px;
        }

        .catalog-title a:hover {
            text-decoration: underline;
        }

        .form-group {
            margin-bottom: 7px;
        }

        body {
            overflow: hidden;
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>
<div class="fin">
    <h2 class="catalog-title">Добавление категории</h2>
</div>
<div class="container-fluid bg-image"
     style="background-color: #90a6a4; height: 100vh; overflow: auto">
    <div class="form-container">
        <div class="formUser">
            <form th:action="@{/category/add}" th:object="${category}" method="post">
                <div class="form-group">
                    <label for="name">Название категории:</label>
                    <input type="text" class="form-control" id="name" th:field="*{name}" required/>
                    <div th:if="${#fields.hasErrors('name')}" class="text-danger">
                        <span th:errors="*{name}"></span>
                    </div>
                </div>

                <div style="display: flex; justify-content: space-between; padding: 10px 0">
                    <button type="submit" class="btn btn-success">Добавить</button>
                    <a href="/category" class="btn btn-secondary">Назад</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
