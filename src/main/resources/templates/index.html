<body>
<div class="header">
    <h1>Интернет-магазин электроники</h1>
</div>

<div class="user-profile">
    <div class="user-icon" onclick="toggleUserDropdown()">
        <i class="fas fa-user"></i>
    </div>
    <div class="user-dropdown" id="userDropdown">
        <a href="/users/profile"><i class="fas fa-user-circle"></i> Мой профиль</a>
        <a href="/orders"><i class="fas fa-shopping-bag"></i> Мои заказы</a>
        <a href="/reviews"><i class="fas fa-star"></i> Мои отзывы</a>
        <a href="/settings"><i class="fas fa-cog"></i> Настройки</a>
        <a href="/login" style="border-top: 1px solid rgba(255,255,255,0.2); margin-top: 10px; padding-top: 10px;">
            <i class="fas fa-sign-out-alt"></i> Выйти
        </a>
    </div>
</div>

<div class="container">
    <div class="sort-dropdown">
        <select onchange="sortAndFilterProducts(this.value)">
            <option value="">Сортировка и фильтр</option>
            <option value="price_asc">По возрастанию цены</option>
            <option value="price_desc">По убыванию цены</option>
            <option value="rating_5">5 звезд</option>
            <option value="rating_4">4 звезды и выше</option>
            <option value="rating_3">3 звезды и выше</option>
            <option value="rating_2">2 звезды и выше</option>
            <option value="rating_1">1 звезда и выше</option>
        </select>
    </div>

    <div class="products">
        <div class="product-card" th:each="product : ${products}" th:data-id="${product.id}" th:data-name="${product.name}" th:data-price="${product.price}" onclick="openModal(this)">
            <img th:src="${product.fileurl}" alt="Товар">
            <h3 th:text="${product.name}"></h3>
            <p th:text="${product.description}"></p>
            <div class="price" th:text="|$${product.price}|"></div>
            <div class="average-rating">
                <span th:text="'Рейтинг: ' + ${product.averageRating != null ? product.averageRating : '0.0'} + ' из 5'"></span>
            </div>
            <button th:data-name="${product.name}" th:data-price="${product.price}" onclick="addToCart(this, event)">Добавить в корзину</button>
            <a th:href="@{/reviews/main?productID={id}(id=${product.id})}" style="background-color: #1a4a42; border-color: #1a4a42;" class="btn btn-primary">Оставить отзыв</a>
        </div>
    </div>
    <div class="cart">
        <h2>Корзина</h2>
        <div id="cart-items"></div>
        <div id="cart-total">
            <strong>Итого: $<span id="total-price">0.00</span></strong>
        </div>
        <button style="background-color: #1a4a42; border-color: #1a4a42;"
                class="btn btn-primary"
                id="checkout-button"
                onclick="handleCheckout()">
            Оформить заказ
        </button>
    </div>
</div>


<div th:each="product : ${products}" th:id="|product${product.id}|" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 th:text="${product.name}"></h2>
            <button class="close" onclick="closeModal(this)">&times;</button>
        </div>
        <div class="modal-body">
            <div class="modal-left">
                <img th:src="${product.fileurl}" alt="Товар">
                <div class="price" th:text="|$${product.price}|"></div>
            </div>
            <div class="modal-right">
                <p th:text="${product.description}"></p>
                <div class="reviews">
                    <h3>Отзывы</h3>
                    <div th:each="review : ${product.reviews}" th:id="|review${review.id}|">
                        <div class="review-item">
                            <h4 th:text="'Пользователь ' + ${review.userID}"></h4>
                            <p th:text="'Рейтинг: ' + ${review.rating} + ' звезд(ы)'"></p>
                            <p th:text="${review.comment}"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let cart = [];
    let totalPrice = 0;

    // Функция для переключения выпадающего меню пользователя
    function toggleUserDropdown() {
        const dropdown = document.getElementById('userDropdown');
        dropdown.classList.toggle('show');
    }

    // Закрытие выпадающего меню при клике вне его
    document.addEventListener('click', function(event) {
        const userProfile = document.querySelector('.user-profile');
        const dropdown = document.getElementById('userDropdown');
        if (!userProfile.contains(event.target)) {
            dropdown.classList.remove('show');
        }
    });

    function handleCheckout() {
        if (cart.length === 0) {
            alert("Ваша корзина пуста!");
            return;
        }
        alert("Заглушка: Заказ оформлен!");
    }

    function addToCart(button) {
        event.stopPropagation();
        const name = button.getAttribute('data-name');
        const price = parseFloat(button.getAttribute('data-price'));
        cart.push({ name, price });
        totalPrice += price;
        updateCart();
    }

    function updateCart() {
        const cartItems = document.getElementById('cart-items');
        const totalPriceElement = document.getElementById('total-price');
        cartItems.innerHTML = '';
        cart.forEach((item, index) => {
            const cartItem = document.createElement('div');
            cartItem.className = 'cart-item';
            cartItem.innerHTML = `
                <span>${item.name} - $${item.price.toFixed(2)}</span>
                <button onclick="removeFromCart(${index})">Удалить</button>
            `;
            cartItems.appendChild(cartItem);
        });
        totalPriceElement.textContent = totalPrice.toFixed(2);
    }

    function removeFromCart(index) {
        totalPrice -= cart[index].price;
        cart.splice(index, 1);
        updateCart();
    }

    function openModal(productCard) {
        const modalId = 'product' + productCard.getAttribute('data-id');
        const modal = document.getElementById(modalId);
        modal.style.display = 'flex';
    }

    function closeModal(button) {
        const modal = button.closest('.modal');
        modal.style.display = 'none';
    }

    function sortAndFilterProducts(value) {
        const productsContainer = document.querySelector('.products');
        const productCards = Array.from(productsContainer.querySelectorAll('.product-card'));

        if (value.startsWith('rating_')) {
            const minRating = parseFloat(value.split('_')[1]);
            productCards.forEach(card => {
                const averageRatingText = card.querySelector('.average-rating span').textContent;
                const averageRating = parseFloat(averageRatingText.match(/\d+\.\d+/)[0]); // Извлекаем рейтинг из текста

                if (averageRating >= minRating) {
                    card.style.display = 'block'; // Показываем товар
                } else {
                    card.style.display = 'none'; // Скрываем товар
                }
            });
        } else {
            productCards.forEach(card => card.style.display = 'block');
        }

        if (value === 'price_asc' || value === 'price_desc') {
            productCards.sort((a, b) => {
                const priceA = parseFloat(a.querySelector('.price').textContent.replace('$', ''));
                const priceB = parseFloat(b.querySelector('.price').textContent.replace('$', ''));
                return value === 'price_asc' ? priceA - priceB : priceB - priceA;
            });

            productsContainer.innerHTML = '';
            productCards.forEach(card => productsContainer.appendChild(card));
        }
    }

    function openCheckoutModal() {
        if (cart.length === 0) {
            alert("Ваша корзина пуста!");
            return;
        }
        const modal = document.getElementById('checkout-modal');
        modal.style.display = 'flex';
    }

    function closeCheckoutModal() {
        const modal = document.getElementById('checkout-modal');
        modal.style.display = 'none';
    }

    function redirectToCheckout() {
        if (cart.length === 0) {
            alert("Ваша корзина пуста!");
            return;
        }

        const userID = 1;
        window.location.href = `/orders/checkout?userID=${userID}&totalPrice=${totalPrice}`;
    }

    window.onclick = function (event) {
        if (event.target.classList.contains('modal')) {
            if (event.target.id === 'checkout-modal') {
                closeCheckoutModal();
            } else {
                event.target.style.display = 'none';
            }
        }
    };

</script>
