<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Выбор каталога</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <style>
        body {
            background: linear-gradient(135deg, #90a6a4, #123530);
            font-family: 'Arial', sans-serif;
            color: #fff;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: auto;
        }

        .row {
            padding-left: 30%;
            padding-right: 30%;


        }

        .blockquote {
            background-color: rgba(48, 104, 96, 0.9);
            color: #d3ecec;
            text-align: center;
            padding: 20px;
            margin: 0;
        }

        .blockquote h1, .blockquote h2 {
            margin: 0;
            color: #d3ecec;
        }

        .catalog-title {
            background-color: transparent;
            color: #d3ecec;
            text-align: center;
            padding: 10px;
            margin: 0;
        }

        .catalog-title a {
            color: #d3ecec;
            text-decoration: none;
        }

        .catalog-title a:hover {
            text-decoration: underline;
        }

        .list-group-item {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            margin-bottom: 10px;
            margin-top: 20px;

            padding: 15px;
            transition: all 0.3s ease;
        }

        .list-group-item:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-5px);
        }

        .list-group-item h2 {
            font-size: 1.5rem;
            color: #d3ecec;
        }

        .btn-danger {
            background: #101c17;
            border: none;
            border-radius: 10px;
            padding: 10px 20px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-danger:hover {
            background: #ff4c4c;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
<div class="blockquote">
    <h1>Интернет-магазин электроники</h1>
</div>
<h2 class="catalog-title">Выбор каталога</h2>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <ul class="list-group">
                <li class="list-group-item">
                    <h2 class="catalog-title"><a href="/users">Пользователи</a></h2>
                </li>
                <li class="list-group-item">
                    <h2 class="catalog-title"><a href="/category">Категории товаров</a></h2>
                </li>
                <li class="list-group-item">
                    <h2 class="catalog-title"><a href="/products">Товары</a></h2>
                </li>
                <li class="list-group-item">
                    <h2 class="catalog-title"><a href="/reviews">Отзывы</a></h2>
                </li>
                <li class="list-group-item">
                    <h2 class="catalog-title"><a href="/orders">Заказы</a></h2>
                </li>
            </ul>
        </div>
    </div>
    <div class="out" style="display: flex; justify-content: center; align-items: center; margin-top: 20px;">
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn btn-danger">Выйти</button>
        </form>
    </div>
</div>
</body>
</html>
