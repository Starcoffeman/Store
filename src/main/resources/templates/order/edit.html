<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Редактирование заказа</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .container-fluid {
            flex: 1;
        }

        .blockquote {
            background-color: rgba(48, 104, 96, 0.9);
            color: #d3ecec;
            text-align: center;
            padding: 20px;
            margin: 0;
        }

        .catalog-title {
            background-color: transparent;
            color: #123530;
            text-align: center;
            padding: 10px;
            margin: 0;
        }

        .fin {
            background-color: #90a6a4;
        }

        .catalog-title a {
            color: #123530;
            text-decoration: none;
        }

        .catalog-title a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="fin">
    <h2 class="catalog-title">Редактирование заказа</h2>
</div>
<div class="container-fluid bg-image"
     style="background-color: #90a6a4; height: 100vh; overflow: auto">
    <form th:action="@{/orders/edit/{id}(id=${orderDto.id})}" th:object="${orderDto}" method="post">
        <div class="form-group">
            <label for="userID">ID пользователя:</label>
            <input type="number" class="form-control" id="userID" th:field="*{userID}" required/>
        </div>
        <div class="form-group">
            <label for="status">Статус:</label>
            <input type="text" class="form-control" id="status" th:field="*{status}" required/>
        </div>
        <div class="form-group">
            <label for="status">Статус:</label>
            <input type="text" class="form-control" id="" th:field="*{status}" required/>
        </div>
        <div class="form-group">
            <label for="totalPrice">Сумма:</label>
            <input type="number" class="form-control" id="totalPrice" th:field="*{totalPrice}" required/>
        </div>
        <div style="display: flex;justify-content:space-between;padding: 10px 0">
            <button type="submit" class="btn btn-success">Сохранить</button>
            <a href="/orders" class="btn btn-secondary">Назад</a>
        </div>
    </form>
</div>
</body>
</html>
