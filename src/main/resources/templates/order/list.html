<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Заказы</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .container-fluid {
        flex: 1;
    }

    .blockquote {
        background-color: rgba(48, 104, 96, 0.9);
        color: #d3ecec;
        text-align: center;
        padding: 20px;
        margin: 0;
    }

    .catalog-title {
        background-color: transparent;
        color: #123530;
        text-align: center;
        padding: 10px;
        margin: 0;
    }

    .fin {
        background-color: #90a6a4;
    }

    .catalog-title a {
        color: #123530;
        text-decoration: none;
    }

    .catalog-title a:hover {
        text-decoration: underline;
    }
  </style>
</head>
<body>
<div class="fin">
  <h2 class="catalog-title">Заказы</h2>
</div>
<div class="container-fluid bg-image"
     style="background-color: #90a6a4; height: 100vh; overflow: auto">
  <table id="ordersTable" class="table table-striped table-responsive-md">
    <thead>
    <tr>
      <th scope="col">ID пользователя</th>
      <th scope="col">Дата заказа</th>
      <th scope="col">Статус</th>
      <th scope="col">Сумма</th>
      <th scope="col">Действия</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="order: ${listOrders}">
      <td th:text="${order.userID}">ID пользователя</td>
      <td th:text="${order.orderDate}">Дата заказа</td>
      <td th:text="${order.status}">Статус</td>
      <td th:text="${order.totalPrice}">Сумма</td>
      <td>
        <a th:href="@{'/orders/edit/' + ${order.id}}" class="btn btn-primary btn-sm">Редактировать</a>
        <a th:href="@{'/orders/delete/' + ${order.id}}" class="btn btn-warning btn-sm">Удалить</a>
      </td>
    </tr>
    </tbody>
  </table>

  <div class="btn-group" role="group" aria-label="Basic example">
    <a href="/orders/add" class="btn btn-primary" aria-pressed="false" autocomplete="off">
      Добавить заказ
    </a>
    <a style="margin-left: 10px" href="/admin" class="btn btn-secondary">Назад</a>
  </div>
</div>
</body>
</html>
