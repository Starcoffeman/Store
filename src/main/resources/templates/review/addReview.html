<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Добавление отзыва</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
  <style>
    .container-fluid {
        flex: 1;
    }

    .blockquote {
        background-color: rgba(48, 104, 96, 0.9);
        color: #d3ecec;
        text-align: center;
        padding: 20px;
        margin: 0;
    }

    .blockquote h1, .blockquote h2 {
        margin: 0;
        color: #d3ecec;
    }

    .catalog-title {
        background-color: transparent;
        color: #123530;
        text-align: center;
        padding: 10px;
        margin: 0;
    }

    .fin {
        background-color: #90a6a4;
    }

    .catalog-title a {
        color: #123530;
        text-decoration: none;
    }

    .catalog-title a:hover {
        text-decoration: underline;
    }
  </style>
</head>
<body>
<div class="fin">
  <blockquote class="blockquote text-center">
    <h1>Интернет-магазин цифровых товаров</h1>
  </blockquote>
  <h2 class="catalog-title">Добавление отзыва</h2>
</div>
<div class="container-fluid bg-image"
     style="background-color: #90a6a4; height: 100vh; overflow: auto">

  <form th:action="@{/reviews/add}" th:object="${review}" method="post">
    <div class="form-group">
      <label for="userID">Пользователь:</label>
      <select class="form-control" id="userID" th:field="*{userID}" required>
        <option value="">-- Выберите пользователя --</option>
        <option th:each="user : ${listUsers}"
                th:value="${user.id}"
                th:text="${user.username + ' (' + user.email + ')'}">
        </option>
      </select>
      <div th:if="${#fields.hasErrors('userID')}" class="text-danger">
        <span th:errors="*{userID}"></span>
      </div>
    </div>
    <div class="form-group">
      <label for="productId">Товар:</label>
      <select class="form-control" id="productId" th:field="*{productID}" required>
        <option value="">-- Выберите товар --</option>
        <option th:each="product : ${productList}"
                th:value="${product.id}"
                th:text="${product.name + ' (' + product.price + ')'}">
        </option>
      </select>
    </div>
    <div class="form-group">
      <label for="rating">Рейтинг:</label>
      <input type="number" class="form-control" id="rating" th:field="*{rating}" min="1" max="5" required/>
      <div th:if="${#fields.hasErrors('rating')}" class="text-danger">
        <span th:errors="*{rating}"></span>
      </div>
    </div>
    <div class="form-group">
      <label for="comment">Комментарий:</label>
      <textarea class="form-control" id="comment" th:field="*{comment}" required></textarea>
      <div th:if="${#fields.hasErrors('comment')}" class="text-danger">
        <span th:errors="*{comment}"></span>
      </div>
    </div>
    <div style="display: flex;justify-content:space-between;padding: 10px 0">
      <button type="submit" class="btn btn-success">Добавить</button>
      <a href="/reviews" class="btn btn-secondary">Назад</a>
    </div>
  </form>

</div>
</body>
</html>
