<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Отзывы</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <style>
        .container-fluid {
            flex: 1;
        }

        .blockquote {
            background-color: rgba(48, 104, 96, 0.9);
            color: #d3ecec;
            text-align: center;
            padding: 20px;
            margin: 0;
        }

        .blockquote h1, .blockquote h2 {
            margin: 0;
            color: #d3ecec;
        }

        .catalog-title {
            background-color: transparent;
            color: #123530;
            text-align: center;
            padding: 10px;
            margin: 0;
        }

        .fin {
            background-color: #90a6a4;
        }

        .catalog-title a {
            color: #123530;
            text-decoration: none;
        }

        .catalog-title a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="fin">
    <h2 class="catalog-title">Отзывы</h2>
</div>
<div class="container-fluid bg-image"
     style="background-color: #90a6a4; height: 100vh; overflow: auto">
    <table id="reviewsTable" class="table table-striped table-responsive-md">
        <thead>
        <tr>
            <th scope="col">Пользователь</th>
            <th scope="col">Продукт</th>
            <th scope="col">Рейтинг</th>
            <th scope="col">Комментарий</th>
            <th scope="col">Дата</th>
            <th scope="col">Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="review: ${listReviews}">
            <td th:text="${review.userID}">Пользователь</td>
            <td th:text="${review.productID}">Продукт</td>
            <td th:text="${review.rating}">Рейтинг</td>
            <td th:text="${review.comment}">Комментарий</td>
            <td th:text="${review.reviewDate}">Дата</td>
            <td>
                <a th:href="@{'/reviews/edit/' + ${review.id}}" class="btn btn-primary btn-sm">Редактировать</a>
                <a th:href="@{'/reviews/delete/' + ${review.id}}" class="btn btn-warning btn-sm">Удалить</a>
            </td>
        </tr>
        </tbody>
    </table>

    <div class="btn-group" role="group" aria-label="Basic example">
        <a href="/reviews/add" class="btn btn-primary" aria-pressed="false" autocomplete="off">
            Добавить отзыв
        </a>
        <a style="margin-left: 10px" href="/admin" class="btn btn-secondary">Назад</a>
    </div>
</div>
</body>
</html>
