<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Редактирование отзыва</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <style>
        .container-fluid {
            flex: 1;
        }

        .blockquote {
            background-color: rgba(48, 104, 96, 0.9);
            color: #d3ecec;
            text-align: center;
            padding: 20px;
            margin: 0;
        }

        .catalog-title {
            background-color: transparent;
            color: #123530;
            text-align: center;
            padding: 10px;
            margin: 0;
        }

        .fin {
            background-color: #90a6a4;
        }
    </style>
</head>
<body>
<div class="fin">
    <h2 class="catalog-title">Редактирование отзыва</h2>
</div>
<div class="container-fluid bg-image" style="background-color: #90a6a4; height: 100vh; overflow: auto">
    <form th:action="@{/reviews/edit/{id}(id=${reviewDto.id})}" th:object="${reviewDto}" method="post">
        <div class="form-group" th:object=$"">
            <label for="userID">Пользователь:</label>
            <input type="text" class="form-control" id="userID" th:field="*{userID}" required/>
        </div>

        <div class="form-group">
            <label for="productID">Продукт:</label>
            <input type="text" class="form-control" id="productID" th:field="*{productID}" required/>
        </div>

        <div class="form-group">
            <label for="rating">Рейтинг:</label>
            <input type="number" min="1" max="5" class="form-control" id="rating" th:field="*{rating}" required/>
            <div th:if="${#fields.hasErrors('rating')}" class="text-danger">
                <span th:errors="*{rating}"></span>
            </div>
        </div>

        <div class="form-group">
            <label for="comment">Комментарий:</label>
            <textarea class="form-control" id="comment" th:field="*{comment}" required></textarea>
            <div th:if="${#fields.hasErrors('comment')}" class="text-danger">
                <span th:errors="*{comment}"></span>
            </div>
        </div>

        <div style="display: flex;justify-content: space-between; padding: 10px 0">
            <button type="submit" class="btn btn-success">Сохранить</button>
            <a href="/reviews" class="btn btn-secondary">Назад</a>
        </div>
    </form>
</div>
</body>
</html>
