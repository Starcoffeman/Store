<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
<!--    <link href="css/register.css" rel="stylesheet" />-->
    <title>Регистрация</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
</head>
<style>
    body {
           background: linear-gradient(135deg, #90a6a4, #123530);
           font-family: 'Arial', sans-serif;
           color: #fff;
           margin: 0;
           padding: 0;
           height: 100vh;
           display: flex;
           justify-content: center;
           align-items: center;
           overflow: hidden;
       }

       .register-container {
           background: rgba(255, 255, 255, 0.1);
           backdrop-filter: blur(10px);
           border-radius: 15px;
           padding: 30px;
           width: 100%;
           max-width: 600px;
           box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
           animation: fadeIn 1s ease-in-out;
       }

       @keyframes fadeIn {
           from {
               opacity: 0;
               transform: translateY(-20px);
           }
           to {
               opacity: 1;
               transform: translateY(0);
           }
       }

       .register-header {
           text-align: center;
           margin-bottom: 30px;
       }

       .register-header h1 {
           font-size: 2.5rem;
           font-weight: bold;
           color: #fff;
           margin-bottom: 10px;
           animation: slideIn 1s ease-in-out;
       }

       .form-group {
           margin-bottom: 20px;
       }

       .form-group label {
           font-weight: bold;
           color: #d3ecec;
       }

       .form-control {
           background: rgba(255, 255, 255, 0.2);
           border: none;
           border-radius: 10px;
           color: #fff;
           padding: 10px;
           margin-top: 5px;
           transition: all 0.3s ease;
       }

       .form-control:focus {
           background: rgba(255, 255, 255, 0.3);
           box-shadow: none;
           border: none;
       }

       .btn-success {
           background: #123530;
           border: none;
           border-radius: 10px;
           padding: 10px 20px;
           font-weight: bold;
           transition: all 0.3s ease;
       }

       .btn-success:hover {
           background: #1a4a42;
           transform: translateY(-2px);
       }

       .text-danger {
           color: #ff6b6b !important;
           font-weight: bold;
       }

       .form-footer {
           display: flex;
           justify-content: space-between;
           align-items: center;
           margin-top: 20px;
       }

       .form-footer a {
           color: #d3ecec;
           text-decoration: none;
           transition: all 0.3s ease;
       }

       .form-footer a:hover {
           color: #fff;
           text-decoration: underline;
       }

       .all {
           display: flex;
       }

       .group1{
           margin-right:20px;
           flex:40%;
       }


        .group2{
           margin-left:20px;
           flex:40%;
       }
</style>
<body>
<div class="register-container">
    <div class="register-header">
        <h1>Регистрация</h1>
    </div>
    <form th:action="@{/register}" method="post" th:object="${registerForm}">
        <div class="all">
            <div class="group1">
                <div class="form-group">
                    <label for="username">Логин:</label>
                    <input type="text" class="form-control" id="username" th:field="*{username}" required/>
                    <div th:if="${#fields.hasErrors('username')}" class="text-danger">
                        <span th:errors="*{username}"></span>
                    </div>
                </div>
                <div class="form-group">
                    <label for="name">Имя:</label>
                    <input type="text" class="form-control" id="name" th:field="*{name}" required/>
                    <div th:if="${#fields.hasErrors('name')}" class="text-danger">
                        <span th:errors="*{name}"></span>
                    </div>
                </div>
                <div class="form-group">
                    <label for="surname">Фамилия:</label>
                    <input type="text" class="form-control" id="surname" th:field="*{surname}" required/>
                    <div th:if="${#fields.hasErrors('surname')}" class="text-danger">
                        <span th:errors="*{surname}"></span>
                    </div>
                </div>
                <div class="form-group">
                    <label for="password">Пароль:</label>
                    <input type="password" class="form-control" id="password" th:field="*{password}" required/>
                    <div th:if="${#fields.hasErrors('password')}" class="text-danger">
                        <span th:errors="*{password}"></span>
                    </div>
                </div>
            </div>
            <div class="group2">
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" class="form-control" id="email" th:field="*{email}" required/>
                    <div th:if="${#fields.hasErrors('email')}" class="text-danger">
                        <span th:errors="*{email}"></span>
                    </div>
                </div>
                <div class="form-group">
                    <label for="address">Address:</label>
                    <input type="text" class="form-control" id="address" th:field="*{address}" required/>
                    <div th:if="${#fields.hasErrors('address')}" class="text-danger">
                        <span th:errors="*{address}"></span>
                    </div>
                </div>
                <div class="form-group">
                    <label for="phone">Phone:</label>
                    <input type="number" class="form-control" id="phone" th:field="*{phone}" required/>
                    <div th:if="${#fields.hasErrors('phone')}" class="text-danger">
                        <span th:errors="*{phone}"></span>
                    </div>
                </div>
            </div>
        </div>
        <div th:if="${param.error}" class="text-danger">
            <span>Ошибка при регистрации</span>
        </div>
        <div class="form-footer">
            <button type="submit" class="btn btn-success">Зарегистрироваться</button>
            <a href="/login">Вход</a>
        </div>
    </form>
</div>
</body>
</html>
