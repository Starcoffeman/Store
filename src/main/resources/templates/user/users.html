<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Пользователи</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <style>
        .container-fluid {
            flex: 1;
        }

        .blockquote {
            background-color: rgba(48, 104, 96, 0.9);
            color: #d3ecec;
            text-align: center;
            padding: 20px;
            margin: 0;
        }

        .blockquote h1, .blockquote h2 {
            margin: 0;
            color: #d3ecec;
        }

        .catalog-title {
            background-color: transparent;
            color: #123530;
            text-align: center;
            padding: 10px;
            margin: 0;
        }

        .fin {
            background-color: #90a6a4;
        }

        .catalog-title a {
            color: #123530;
            text-decoration: none;
        }

        .catalog-title a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="fin">
    <h2 class="catalog-title">Пользователи</h2>
</div>
<div class="container-fluid bg-image"
     style="background-color: #90a6a4; height: 100vh; overflow: auto">
    <table id="usersTable" class="table table-striped table-responsive-md">
        <thead>
        <tr>
            <th scope="col">ID</th>
            <th scope="col">Никнейм</th>
            <th scope="col">Имя</th>
            <th scope="col">Фамилия</th>
            <th scope="col">Email</th>
            <th scope="col">Адрес</th>
            <th scope="col">Телефон</th>
            <th scope="col">Дата регистрации</th>
            <th scope="col">Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="user: ${listUsers}">
            <td th:text="${user.id}">ID</td>
            <td th:text="${user.username}">Никнейм</td>
            <td th:text="${user.name}">Имя</td>
            <td th:text="${user.surname}">Фамилия</td>
            <td th:text="${user.email}">Email</td>
            <td th:text="${user.address}">Адрес</td>
            <td th:text="${user.phone}">Телефон</td>
            <td th:text="${user.registrationDate}">Дата регистрации</td>
            <td>
                <a th:href="@{'/users/edit/' + ${user.id}}" class="btn btn-primary btn-sm">Редактирование</a>
                <a th:href="@{'/users/delete/' + ${user.id}}" class="btn btn-warning btn-sm">Удалить</a>
            </td>
        </tr>
        </tbody>
    </table>

    <div class="btn-group" role="group" aria-label="Basic example">
        <a href="/users/add" class="btn btn-primary" aria-pressed="false" autocomplete="off">
            Добавить пользователя
        </a>
        <a style="margin-left: 10px" href="/admin" class="btn btn-secondary">Назад</a>
    </div>
</div>
</body>
</html>
