<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Редактирование пользователя</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <style>
        .container-fluid {
            flex: 1;
        }

        .blockquote {
            background-color: rgba(48, 104, 96, 0.9);
            color: #d3ecec;
            text-align: center;
            padding: 20px;
            margin: 0;
        }

        .catalog-title {
            background-color: transparent;
            color: #123530;
            text-align: center;
            padding: 10px;
            margin: 0;
        }

     .formUser {
            width: 300px;
            margin: 0 auto;/
            padding: 20px;
        }

       .form-container {
            display: flex;
            justify-content: center;
            height: 100%;
        }

        .fin {
            background-color: #90a6a4;
        }


        body {
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

         .form-group {
            margin-bottom: 7px;
        }
    </style>
</head>
<body>
<div class="fin">
    <h2 class="catalog-title">Редактирование пользователя</h2>
</div>
<div class="container-fluid bg-image" style="background-color: #90a6a4; height: 100vh; overflow: auto">
    <div class="formUser">
            <form th:action="@{/users/edit/{id}(id=${user.id})}" th:object="${user}" method="post">
            <div class="form-group">
                <label for="username">Имя пользователя:</label>
                <input type="text" class="form-control" id="username" th:field="*{username}" required/>
                <div th:if="${#fields.hasErrors('username')}" class="text-danger">
                    <span th:errors="*{username}"></span>
                </div>
            </div>
            <div class="form-group">
                <label for="password">Пароль:</label>
                <input type="password" class="form-control" id="password" th:field="*{password}" required/>
                <div th:if="${#fields.hasErrors('password')}" class="text-danger">
                    <span th:errors="*{password}"></span>
                </div>
            </div>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" class="form-control" id="email" th:field="*{email}" required/>
                <div th:if="${#fields.hasErrors('email')}" class="text-danger">
                    <span th:errors="*{email}"></span>
                </div>
            </div>
            <div class="form-group">
                <label for="name">Имя:</label>
                <input type="text" class="form-control" id="name" th:field="*{name}" required/>
                <div th:if="${#fields.hasErrors('name')}" class="text-danger">
                    <span th:errors="*{name}"></span>
                </div>
            </div>
            <div class="form-group">
                <label for="surname">Фамилия:</label>
                <input type="text" class="form-control" id="surname" th:field="*{surname}" required/>
                <div th:if="${#fields.hasErrors('surname')}" class="text-danger">
                    <span th:errors="*{surname}"></span>
                </div>
            </div>
            <div class="form-group">
                <label for="address">Адрес:</label>
                <input type="text" class="form-control" id="address" th:field="*{address}" required/>
                <div th:if="${#fields.hasErrors('address')}" class="text-danger">
                    <span th:errors="*{address}"></span>
                </div>
            </div>
            <div class="form-group">
                <label for="phone">Телефон:</label>
                <input type="text" class="form-control" id="phone" th:field="*{phone}" required/>
                <div th:if="${#fields.hasErrors('phone')}" class="text-danger">
                    <span th:errors="*{phone}"></span>
                </div>
            </div>

            <div style="display: flex;justify-content: space-between; padding: 10px 0">
                <button type="submit" class="btn btn-success">Сохранить</button>
                <a href="/users" class="btn btn-secondary">Назад</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
