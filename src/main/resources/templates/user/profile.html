<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Профиль пользователя | Интернет-магазин электроники</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
        background: linear-gradient(135deg, #90a6a4, #123530);
        font-family: 'Arial', sans-serif;
        color: #fff;
        margin: 0;
        padding: 0;
        min-height: 100vh;
    }

    .header {
        background: rgba(48, 104, 96, 0.9);
        padding: 20px;
        text-align: center;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .header h1 {
        font-size: 2.5rem;
        font-weight: bold;
        color: #d3ecec;
        margin: 0;
        animation: slideIn 1s ease-in-out;
    }

    .container {
        padding: 20px;
        max-width: 1200px;
        margin: 0 auto;
        display: flex;
        gap: 20px;
    }

    .user-profile {
        position: fixed;
        top: 100px;
        right: 20px;
        z-index: 1000;
    }

    .user-icon {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        border-radius: 50%;
        width: 70px;
        height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        border: 2px solid rgba(255, 255, 255, 0.2);
    }

    .user-icon:hover {
        background: rgba(255, 255, 255, 0.2);
        transform: translateY(-2px);
        box-shadow: 0 6px 8px rgba(0, 0, 0, 0.2);
    }

    .user-icon i {
        font-size: 24px;
        color: #d3ecec;
    }

    .user-dropdown {
        position: absolute;
        top: 70px;
        right: 0;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(15px);
        border-radius: 10px;
        padding: 15px;
        min-width: 200px;
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        display: none;
        border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .user-dropdown.show {
        display: block;
        animation: fadeIn 0.3s ease-in-out;
    }

    .user-dropdown a {
        display: block;
        color: #d3ecec;
        text-decoration: none;
        padding: 10px;
        border-radius: 5px;
        transition: background 0.3s ease;
    }

    .user-dropdown a:hover {
        background: rgba(255, 255, 255, 0.1);
    }

    .user-dropdown a i {
        margin-right: 10px;
        width: 20px;
        text-align: center;
    }

    .profile-container {
        display: flex;
        gap: 20px;
        width: 100%;
        margin-top: 20px;
    }

    .profile-sidebar {
        flex: 1;
        max-width: 400px;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        border-radius: 15px;
        padding: 20px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .profile-main {
        flex: 3;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        border-radius: 15px;
        padding: 20px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .profile-header {
        display: flex;
        align-items: center;
        margin-bottom: 30px;
        padding-bottom: 20px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.2);
    }

    .profile-avatar {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.1);
        display: flex;
        align-items: center;
        justify-content: center;
        margin-right: 20px;
        overflow: hidden;
        border: 3px solid rgba(255, 255, 255, 0.2);
    }

    .profile-avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .profile-info h2 {
        font-size: 1.8rem;
        color: #d3ecec;
        margin: 0 0 5px 0;
    }

    .profile-info p {
        color: #fff;
        margin: 0;
        font-size: 1rem;
    }

    .profile-stats {
        display: flex;
        justify-content: space-around;
        margin: 20px 0;
    }

    .stat-item {
        text-align: center;
    }

    .stat-value {
        font-size: 1.5rem;
        font-weight: bold;
        color: #d3ecec;
    }

    .stat-label {
        font-size: 0.9rem;
        color: #fff;
    }

    .profile-section {
        margin-bottom: 30px;
    }

    .profile-section h3 {
        font-size: 1.4rem;
        color: #d3ecec;
        margin-bottom: 15px;
        padding-bottom: 10px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.2);
    }

    .info-item {
        display: flex;
        justify-content: space-between;
        padding: 10px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .info-item:last-child {
        border-bottom: none;
    }

    .info-label {
        font-weight: bold;
        color: #d3ecec;
    }

    .info-value {
        color: #fff;
    }

    .btn-edit {
        background: linear-gradient(135deg, #123530, #1a4a42);
        border: none;
        border-radius: 10px;
        padding: 10px 20px;
        color: #fff;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s ease;
        width: 100%;
        margin-top: 10px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
    }

    .btn-edit:hover {
        background: linear-gradient(135deg, #1a4a42, #123530);
        transform: translateY(-2px);
        box-shadow: 0 6px 8px rgba(0, 0, 0, 0.3);
    }

    .btn-edit:active {
        transform: translateY(0);
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
    }

    .recent-orders {
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    .order-item {
        background: rgba(255, 255, 255, 0.05);
        border-radius: 10px;
        padding: 15px;
        transition: all 0.3s ease;
    }

    .order-item:hover {
        background: rgba(255, 255, 255, 0.1);
        transform: translateY(-2px);
    }

    .order-header {
        display: flex;
        justify-content: space-between;
        margin-bottom: 10px;
    }

    .order-id {
        font-weight: bold;
        color: #d3ecec;
    }

    .order-date {
        color: #fff;
    }

    .order-status {
        padding: 5px 10px;
        border-radius: 20px;
        font-size: 0.8rem;
        font-weight: bold;
    }

    .status-completed {
        background: rgba(40, 167, 69, 0.2);
        color: #28a745;
    }

    .status-pending {
        background: rgba(255, 193, 7, 0.2);
        color: #ffc107;
    }

    .status-processing {
        background: rgba(0, 123, 255, 0.2);
        color: #000000;
    }

    .order-details {
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .order-total {
        font-weight: bold;
        color: #d3ecec;
    }

    .btn-view {
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 5px;
        padding: 5px 10px;
        color: #fff;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .btn-view:hover {
        background: rgba(255, 255, 255, 0.2);
    }

    .recent-reviews {
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    .review-item {
        background: rgba(255, 255, 255, 0.05);
        border-radius: 10px;
        padding: 15px;
        transition: all 0.3s ease;
    }

    .review-item:hover {
        background: rgba(255, 255, 255, 0.1);
        transform: translateY(-2px);
    }

    .review-header {
        display: flex;
        justify-content: space-between;
        margin-bottom: 10px;
    }

    .review-product {
        font-weight: bold;
        color: #d3ecec;
    }

    .review-rating {
        color: #ffc107;
    }

    .review-comment {
        color: #fff;
        margin-bottom: 10px;
    }

    .review-date {
        font-size: 0.8rem;
        color: rgba(255, 255, 255, 0.7);
        text-align: right;
    }

    .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.7);
        justify-content: center;
        align-items: center;
        z-index: 1000;
    }

    .modal-content {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(15px);
        border-radius: 15px;
        padding: 25px;
        width: 90%;
        max-width: 500px;
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        animation: fadeIn 0.5s ease-in-out;
        border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        padding-bottom: 15px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.2);
    }

    .modal-header h2 {
        font-size: 1.8rem;
        color: #d3ecec;
        margin: 0;
        font-weight: 600;
    }

    .modal-header .close {
        background: none;
        border: none;
        color: #d3ecec;
        font-size: 1.5rem;
        cursor: pointer;
        transition: color 0.3s ease;
    }

    .modal-header .close:hover {
        color: #ff6b6b;
    }

    .form-group {
        margin-bottom: 15px;
    }

    .form-group label {
        display: block;
        margin-bottom: 5px;
        color: #d3ecec;
        font-weight: 500;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
        width: 100%;
        padding: 10px;
        border-radius: 8px;
        border: 2px solid transparent;
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
        font-size: 1rem;
        transition: all 0.3s ease;
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
        border-color: #1a4a42;
        background: rgba(255, 255, 255, 0.2);
        outline: none;
        box-shadow: 0 0 8px rgba(26, 74, 66, 0.5);
    }

    .form-group textarea {
        height: 100px;
        resize: none;
    }

    .btn-save {
        background: linear-gradient(135deg, #123530, #1a4a42);
        border: none;
        border-radius: 10px;
        padding: 12px 24px;
        color: #fff;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s ease;
        width: 100%;
        margin-top: 10px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
    }

    .btn-save:hover {
        background: linear-gradient(135deg, #1a4a42, #123530);
        transform: translateY(-2px);
        box-shadow: 0 6px 8px rgba(0, 0, 0, 0.3);
    }

    .btn-save:active {
        transform: translateY(0);
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
    }

    @keyframes slideIn {
        from {
            opacity: 0;
            transform: translateX(-20px);
        }
        to {
            opacity: 1;
            transform: translateX(0);
        }
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(-20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
  </style>
</head>
<body>
<div class="header">
  <h1>Интернет-магазин электроники</h1>
</div>

<div class="user-profile">
  <div class="user-icon" onclick="toggleUserDropdown()">
    <i class="fas fa-user"></i>
  </div>
  <div class="user-dropdown" id="userDropdown">
    <a href="/profile"><i class="fas fa-user-circle"></i> Мой профиль</a>
    <a href="/orders"><i class="fas fa-shopping-bag"></i> Мои заказы</a>
    <a href="/reviews"><i class="fas fa-star"></i> Мои отзывы</a>
    <a href="/settings"><i class="fas fa-cog"></i> Настройки</a>
    <a href="/login" style="border-top: 1px solid rgba(255,255,255,0.2); margin-top: 10px; padding-top: 10px;">
      <i class="fas fa-sign-out-alt"></i> Выйти
    </a>
  </div>
</div>

<div class="container">
  <div class="profile-container">
    <div class="profile-sidebar">
      <div class="profile-header">
        <div class="profile-avatar">
<!--          <img th:src="${user.avatarUrl}" alt="Аватар пользователя" >-->
        </div>
        <div class="profile-info">
          <h2 th:text="${user.surname + ' ' + user.name}"></h2>
          <p th:text="${user.email}"></p>
        </div>
      </div>

      <div class="profile-stats">
        <div class="stat-item">
          <div class="stat-value" th:text="${ordersCount}"></div>
          <div class="stat-label">Заказов</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" th:text="${reviewsCount}"></div>
          <div class="stat-label">Отзывов</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" th:text="${registrationDate}"></div>
          <div class="stat-label">Дата регистрации</div>
        </div>
      </div>

      <div class="profile-section">
        <h3>Контактная информация</h3>
        <div class="info-item">
          <span class="info-label">Телефон:</span>
          <span class="info-value" th:text="${user.phone}"></span>
        </div>
        <div class="info-item">
          <span class="info-label">Адрес:</span>
          <span class="info-value" th:text="${user.address}"></span>
        </div>
        <button class="btn-edit" onclick="openEditModal()">Редактировать профиль</button>
      </div>
    </div>

    <div class="profile-main">
      <div class="profile-section">
        <h3>Недавние заказы</h3>
        <div class="recent-orders">
          <div th:each="order : ${recentOrders}" class="order-item">
            <div class="order-header">
              <span class="order-id" th:text="'Заказ #' + ${order.id}"></span>
              <span class="order-date" th:text="${order.orderDate}"></span>
            </div>
            <div class="order-details">
              <span class="order-total" th:text="'$' + ${order.totalPrice}"></span>
              <span class="order-status" th:classappend="${order.status == 'completed' ? 'status-completed' : (order.status == 'pending' ? 'status-pending' : 'status-processing')}" th:text="${order.status == 'completed' ? 'Завершен' : (order.status == 'pending' ? 'Ожидает оплаты' : 'В обработке')}">Завершен</span>
              <button class="btn-view" th:onclick="'viewOrder(' + ${order.id} + ')'">Подробнее</button>
            </div>
          </div>
        </div>
      </div>

      <div class="profile-section">
        <h3>Недавние отзывы</h3>
        <div class="recent-reviews">
          <div th:each="review : ${recentReviews}" class="review-item">
            <div class="review-header">
              <span class="review-product" th:text="${review.productID}"></span>
              <span class="review-rating">
                                <span th:each="i : ${#numbers.sequence(1, 5)}">
                                    <i th:class="${i <= review.rating ? 'fas fa-star' : 'far fa-star'}"></i>
                                </span>
                            </span>
            </div>
            <div class="review-comment" th:text="${review.comment}"></div>
            <div class="review-date" th:text="${review.reviewDate}"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Модальное окно редактирования профиля -->
<div id="edit-profile-modal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2>Редактирование профиля</h2>
      <button class="close" onclick="closeEditModal()">&times;</button>
    </div>
    <form th:action="@{/users/profile/edit/{id}(id=${user.id})}" th:object="${user}" method="post" id="edit-profile-form">
        <div class="form-group">
            <label for="username">Ник нейм</label>
            <input type="text" id="username"  th:field="*{username}" th:value="${user.username}" required>
        </div>
        <div class="form-group">
        <label for="first-name">Имя</label>
        <input type="text" id="first-name" th:field="*{name}" th:value="${user.name}" required>
      </div>
      <div class="form-group">
        <label for="last-name">Фамилия</label>
        <input type="text" id="last-name" th:field="*{surname}" th:value="${user.surname}" required>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" th:field="*{email}" th:value="${user.email}" required>
      </div>
      <div class="form-group">
        <label for="phone">Телефон</label>
        <input type="tel" id="phone" th:field="*{phone}" th:value="${user.phone}">
      </div>
      <div class="form-group">
        <label for="address">Адрес</label>
        <textarea id="address" th:field="*{address}" th:text="${user.address}"></textarea>
      </div>
      <button type="submit" class="btn-save">Сохранить изменения</button>
    </form>
  </div>
</div>

<script>
  // Функция для переключения выпадающего меню пользователя
  function toggleUserDropdown() {
      const dropdown = document.getElementById('userDropdown');
      dropdown.classList.toggle('show');
  }

  // Закрытие выпадающего меню при клике вне его
  document.addEventListener('click', function(event) {
      const userProfile = document.querySelector('.user-profile');
      const dropdown = document.getElementById('userDropdown');
      if (!userProfile.contains(event.target)) {
          dropdown.classList.remove('show');
      }
  });

  // Функции для работы с модальным окном редактирования профиля
  function openEditModal() {
      const modal = document.getElementById('edit-profile-modal');
      modal.style.display = 'flex';
  }

  function closeEditModal() {
      const modal = document.getElementById('edit-profile-modal');
      modal.style.display = 'none';
  }

  function viewOrder(orderId) {
      window.location.href = '/orders/profile/' + orderId;
  }

  // Закрытие модального окна при клике вне его
  window.onclick = function(event) {
      const modal = document.getElementById('edit-profile-modal');
      if (event.target === modal) {
          closeEditModal();
      }
  };
</script>
</body>
</html>
