<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <style>
        body {
            background: linear-gradient(135deg, #90a6a4, #123530);
            font-family: 'Arial', sans-serif;
            color: #fff;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 30px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            animation: fadeIn 1s ease-in-out;
            position: relative;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            font-size: 2.5rem;
            font-weight: bold;
            color: #fff;
            margin-bottom: 10px;
            animation: slideIn 1s ease-in-out;
        }

        .login-header h2 {
            font-size: 1.5rem;
            color: #d3ecec;
            animation: slideIn 1.2s ease-in-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            font-weight: bold;
            color: #d3ecec;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 18px;
            padding: 10px;
            margin-top: 5px;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.3);
            box-shadow: none;
            border: none;
        }

        .btn-success {
            background: #123530;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            color: #fff;
            padding: 10px 20px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-success:hover {
            background: #1a4a42;
            transform: translateY(-2px);
        }

        .text-danger {
            color: #ff6b6b !important;
            font-weight: bold;
        }

        .form-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
        }

        .form-footer a {
            color: #d3ecec;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .form-footer a:hover {
            color: #fff;
            text-decoration: underline;
        }

        .admin-button {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #123530;
            border: none;
            border-radius: 10px;
            padding: 10px 20px;
            font-weight: bold;
            color: #fff;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .admin-button:hover {
            background: #1a4a42;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
<div class="login-container">
    <button class="btn-success admin-button" onclick="window.location.href='/admin'">Админ</button>

    <div class="login-header">
        <h1>Онлайн-магазин электроники</h1>
        <h2>Вход в систему</h2>
    </div>
    <form th:action="@{/login}" method="post" th:object="${loginForm}">
        <div class="form-group">
            <label for="username">Логин:</label>
            <input type="text" class="form-control" id="username" th:field="*{username}" required/>
            <div th:if="${#fields.hasErrors('username')}" class="text-danger">
                <span th:errors="*{username}"></span>
            </div>
        </div>
        <div class="form-group">
            <label for="password">Пароль:</label>
            <input type="password" class="form-control" id="password" th:field="*{password}" required/>
            <div th:if="${#fields.hasErrors('password')}" class="text-danger">
                <span th:errors="*{password}"></span>
            </div>
        </div>
        <div th:if="${param.error}" class="text-danger">
            <span>Неверные данные авторизации</span>
        </div>
        <div class="form-footer">
            <button type="submit" class="btn btn-success">Войти</button>
            <a href="/register" style="  font-size: 20px;">Регистрация</a>
        </div>
    </form>
</div>
</body>
</html>
